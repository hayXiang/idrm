<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, playsinline">
    <title>HLS.js DRM Decryption Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #000; 
            margin: 0; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        .video-container { 
            position: relative; 
            width: 100%; 
            background: #000; 
        }
        video { 
            width: 100%; 
            display: block; 
        }
        
        .status-panel { 
            padding: 20px; 
            flex-grow: 1; 
        }
        .hls-badge { 
            display: inline-block; 
            padding: 4px 10px; 
            border-radius: 15px; 
            font-size: 12px; 
            font-weight: bold; 
        }
        .supported { 
            background: #2ecc71; 
            color: white; 
        }
        .unsupported { 
            background: #e74c3c; 
            color: white; 
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        input[type="text"], input[type="url"] {
            flex: 1;
            min-width: 250px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: #333;
            color: white;
        }
        
        button {
            padding: 8px 15px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background: #0062CC;
        }
        
        .info-box {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        #logArea {
            width: 100%;
            height: 200px;
            background: #111;
            color: #00FF00;
            border: 1px solid #00FF00;
            border-radius: 5px;
            padding: 10px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            overflow-y: scroll;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
            border-bottom: 1px dashed #333;
        }
        
        .log-timestamp {
            color: #aaa;
            margin-right: 8px;
        }
        
        .log-info {
            color: #00FF00;
        }
        
        .log-warning {
            color: #FFFF00;
        }
        
        .log-error {
            color: #FF6666;
        }
        
        .log-success {
            color: #66FF66;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video" playsinline controls autoplay muted></video>
    </div>

    <div class="status-panel">
        <h3>HLS.js DRM 解密测试</h3>
        <p style="color: #888; font-size: 14px;">
            使用HLS.js播放HLS流，并通过WASM进行客户端解密。
        </p>
        
        <div class="info-box">
            <strong>提示:</strong> 仅支持HLS (m3u8) 格式的视频流。
            系统将自动处理加密片段。
        </div>
        
        <div class="controls">
            <input type="url" id="manifestUrl" placeholder="输入HLS Manifest URL" value="https://lpnba.akamaized.net/live-pz/p/hls-wvpr/NBATVI/index.m3u8?addUserInfo=1&start=LIVE&end=END&PostalCode=0&ISO3166=&sessionId=1fc59b3a-cadb-4d4d-89d8-e07c32f5fd96">
            <button onclick="loadVideo()">加载视频</button>
        </div>
        
        <div class="controls">
            <input type="text" id="clearKey" placeholder="输入Clear Key (格式: kid:key)" value="1acd2d7afd8cb34099cb832862e3c08d:b85491a27c2852323ac704a07cf7b779">
            <button onclick="addKey()">添加密钥</button>
        </div>
        
        <div class="controls">
            <button onclick="clearLogs()" style="background: #FF3B30;">清空日志</button>
            <button onclick="copyLogs()" style="background: #5856D6;">复制日志</button>
        </div>
        
        <textarea id="logArea" readonly></textarea>
    </div>

    <!-- Go WASM 运行时 -->
    <script src="wasm_exec.js"></script>
    <script>
        const logArea = document.getElementById('logArea');
        const video = document.getElementById('video');
        let hls = null;
        let wasmInitialized = false;
        
        // 日志函数
        function logMessage(message, level = 'info') {
            const timestamp = new Date().toISOString().substr(11, 12); // HH:MM:SS.sss
            const levelClass = `log-${level}`;
            const logEntry = `[${timestamp}] ${message}`;
            
            // 添加到日志区域
            if (logArea.value) {
                logArea.value += '\n';
            }
            logArea.value += logEntry;
            
            // 滚动到底部
            logArea.scrollTop = logArea.scrollHeight;
            
            // 同时输出到控制台
            console[level === 'error' ? 'error' : level === 'warning' ? 'warn' : 'log'](message);
        }
        
        function clearLogs() {
            logArea.value = '';
            logMessage('日志已清空', 'info');
        }
        
        function copyLogs() {
            logArea.select();
            document.execCommand('copy');
            logMessage('日志已复制到剪贴板', 'success');
        }

        async function initializeWasm() {
            if (typeof Go === 'undefined') {
                logMessage('wasm_exec.js not loaded', 'error');
                return false;
            }

            try {
                const go = new Go();
                const wasmModule = await WebAssembly.instantiateStreaming(
                    fetch('main.wasm'), go.importObject
                );
                go.run(wasmModule.instance);
                
                // 检查WASM函数是否可用
                if (typeof window.addKey !== 'function' || 
                    typeof window.decryptSegmentM4s !== 'function' ||
                    typeof window.modifyInitM4s !== 'function') {
                    logMessage('WASM functions not available', 'error');
                    return false;
                }
                
                wasmInitialized = true;
                logMessage('WASM initialized successfully', 'success');
                return true;
            } catch (error) {
                logMessage(`WASM initialization failed: ${error.message}`, 'error');
                return false;
            }
        }

        // 初始化应用程序
        async function initApp() {
            // 初始化WASM
            if (!(await initializeWasm())) {
                logMessage('WASM 模块初始化失败', 'error');
                return;
            }

            logMessage('HLS.js 版本: ' + Hls.version, 'info');
            
            const hasHLS = typeof Hls !== 'undefined' && Hls.isSupported();
            logMessage(`浏览器 HLS 支持: ${hasHLS ? '支持' : '不支持'}`, 'info');
            
            if (!hasHLS) {
                logMessage('浏览器不支持 HLS 播放', 'error');
                return;
            }
            
            logMessage('HLS.js 解密测试页面已准备就绪', 'success');
        }

        // 加载视频
        async function loadVideo() {
            if (!wasmInitialized) {
                logMessage('WASM 模块未初始化', 'error');
                return;
            }
            
            const manifestUri = document.getElementById('manifestUrl').value.trim();
            if (!manifestUri) {
                logMessage('请输入有效的HLS流地址', 'error');
                return;
            }
            
            if (!Hls.isSupported()) {
                logMessage('浏览器不支持HLS', 'error');
                return;
            }
            
            // 销毁现有的HLS实例
            if (hls) {
                hls.destroy();
            }
            
            // 创建新的HLS实例
            hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90
            });
            
            // 注册自定义loader用于解密
            class CustomLoader {
                constructor(config) {
                    this.load = this.load.bind(this);
                    this.abort = this.abort.bind(this);
                }

                load(context, config, callbacks) {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', context.url, true);
                    xhr.responseType = context.responseType;
                    
                    // 处理响应
                    xhr.onreadystatechange = () => {
                        if (xhr.readyState === 4) {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                const url = context.url;
                                
                                // 检查是否为m3u8 manifest
                                if (url.toLowerCase().endsWith('.m3u8') || context.type === 'manifest') {
                                    // 获取文本内容
                                    const manifestText = xhr.responseText;
                                    
                                    logMessage(`📄 拦截到 manifest: ${url.substring(url.lastIndexOf('/')+1)}, Size: ${manifestText.length} chars`, 'info');
                                    
                                    // 移除加密相关行
                                    const lines = manifestText.split('\n');
                                    const filteredLines = [];
                                    
                                    for (let i = 0; i < lines.length; i++) {
                                        if (lines[i].startsWith('#EXT-X-KEY:')) {
                                            logMessage(`移除加密密钥信息: ${lines[i]}`, 'info');
                                            continue; // 跳过这一行
                                        }
                                        filteredLines.push(lines[i]);
                                    }
                                    
                                    const modifiedManifest = filteredLines.join('\n');
                                    
                                    logMessage('Manifest处理完成，移除了加密信息', 'success');
                                    
                                    // 调用回调 - 为文本内容使用正确的数据结构
                                    callbacks.onSuccess({
                                        data: new Uint8Array(new TextEncoder().encode(modifiedManifest)),
                                        response: xhr.response
                                    }, xhr, context);
                                } else {
                                    // 处理二进制数据（初始化片段或媒体片段）
                                    const rawData = new Uint8Array(xhr.response);
                                    
                                    // 记录分片信息
                                    const hexHeader = Array.from(rawData.slice(0, 4))
                                                           .map(b => b.toString(16).padStart(2, '0'))
                                                           .join(' ');
                                    
                                    logMessage(`📦 分片拦截成功！URL: ${url.substring(url.lastIndexOf('/')+1)}, Header: 0x${hexHeader}, Size: ${rawData.byteLength} Bytes`, 'info');
                                    
                                    // 尝试从全局变量获取KID
                                    const clearKeyValue = document.getElementById('clearKey').value || '76a6c65c-5409-42a2-b7c0-0d5bdc9e430a:79706578-perpetual-License';
                                    const kid = clearKeyValue.split(':')[0];
                                    
                                    // 如果是初始化片段
                                    if (url.toLowerCase().includes('init') || url.toLowerCase().endsWith('.m4s')) {
                                        try {
                                            logMessage(`处理初始化片段: ${url.substring(url.lastIndexOf('/')+1)}`, 'info');
                                            // 调用WASM修改初始化片段函数
                                            const result = window.modifyInitM4s(rawData, kid);
                                            if (result && result.success) {
                                                logMessage(`✅ 初始化片段处理成功 原大小: ${rawData.byteLength} -> 新大小: ${result.data.length}`, 'success');
                                                
                                                // 调用回调 - 确保数据结构正确
                                                callbacks.onSuccess({
                                                    data: result.data.buffer,
                                                    response: xhr.response
                                                }, xhr, context);
                                            } else {
                                                logMessage(`⚠️ 初始化片段处理失败: ${result?.error || 'Unknown error'}`, 'warning');
                                                // 如果处理失败，仍然使用原始数据
                                                callbacks.onSuccess({
                                                    data: rawData.buffer,
                                                    response: xhr.response
                                                }, xhr, context);
                                            }
                                        } catch (error) {
                                            logMessage(`❌ 处理初始化片段时出错: ${error.message}`, 'error');
                                            // 如果出错，仍然使用原始数据
                                            callbacks.onSuccess({
                                                data: rawData.buffer,
                                                response: xhr.response
                                            }, xhr, context);
                                        }
                                    } else {
                                        // 处理媒体片段
                                        try {
                                            logMessage(`处理媒体片段: ${url.substring(url.lastIndexOf('/')+1)}`, 'info');
                                            const result = window.decryptSegmentM4s(rawData, kid);
                                            if (result && result.success) {
                                                logMessage(`✅ 分片解密成功 原大小: ${rawData.byteLength} -> 新大小: ${result.data.length}`, 'success');
                                                
                                                // 调用回调 - 确保数据结构正确
                                                callbacks.onSuccess({
                                                    data: result.data.buffer,
                                                    response: xhr.response
                                                }, xhr, context);
                                            } else {
                                                logMessage(`⚠️ 分片解密失败: ${result?.error || 'Unknown error'}`, 'warning');
                                                // 如果解密失败，仍然使用原始数据
                                                callbacks.onSuccess({
                                                    data: rawData.buffer,
                                                    response: xhr.response
                                                }, xhr, context);
                                            }
                                        } catch (error) {
                                            logMessage(`❌ 解密分片时出错: ${error.message}`, 'error');
                                            // 如果出错，仍然使用原始数据
                                            callbacks.onSuccess({
                                                data: rawData.buffer,
                                                response: xhr.response
                                            }, xhr, context);
                                        }
                                    }
                                }
                            } else {
                                logMessage(`❌ 加载失败: ${xhr.status} - ${xhr.statusText}`, 'error');
                                callbacks.onError(xhr, context);
                            }
                        }
                    };
                    
                    // 发送请求
                    xhr.send();
                }

                abort() {
                    logMessage('加载被中止', 'warning');
                }
            }
            
            // 配置HLS使用自定义loader
            hls.config.loader = CustomLoader;
            
            // 绑定事件
            hls.on(Hls.Events.MEDIA_ATTACHED, function () {
                logMessage('视频已附加到HLS实例', 'info');
            });
            
            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                logMessage(`✅ Manifest 解析完成, 变体数量: ${data.levels.length}`, 'success');
                video.play().catch(e => logMessage(`播放失败: ${e.message}`, 'error'));
            });
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                logMessage(`HLS 错误: ${data.type} - ${data.details}`, 'error');
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            logMessage('网络错误，尝试恢复...', 'warning');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            logMessage('媒体错误，尝试恢复...', 'warning');
                            hls.recoverMediaError();
                            break;
                        default:
                            logMessage('致命错误，无法恢复', 'error');
                            break;
                    }
                }
            });
            
            // 加载视频
            hls.attachMedia(video);
            hls.loadSource(manifestUri);
            
            logMessage(`正在加载视频: ${manifestUri}`, 'info');
        }

        function addKey() {
            if (!wasmInitialized) {
                logMessage('WASM 模块未初始化', 'error');
                return;
            }
            
            // 检查函数是否存在
            if (typeof window.addKey !== 'function') {
                logMessage('window.addKey 函数不存在', 'error');
                return;
            }
            
            const clearKeyValue = document.getElementById('clearKey').value;
            if (!clearKeyValue) {
                logMessage('请输入密钥', 'error');
                return;
            }
            
            const [kid, key] = clearKeyValue.split(':');
            if (!kid || !key) {
                logMessage('密钥格式错误，请使用 kid:key 格式', 'error');
                return;
            }
            
            try {
                logMessage(`尝试添加密钥: ${kid}`, 'info');
                const result = window.addKey(kid, key);
                console.log('AddKey result:', result);
                
                if (result && result.success) {
                    logMessage(`✅ 密钥添加成功: ${kid}`, 'success');
                } else {
                    logMessage(`❌ 密钥添加失败: ${result?.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                logMessage(`❌ 添加密钥时出错: ${error.message}`, 'error');
                console.error('AddKey error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
