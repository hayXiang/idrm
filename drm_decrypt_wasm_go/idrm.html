    <script src="wasm_exec.js"></script>
    <script>
        async function initializeWasm() {
            if (typeof Go === 'undefined') {
                log('wasm_exec.js not loaded', 'error');
                return false;
            }

            try {
                const go = new Go();
                const wasmModule = await WebAssembly.instantiateStreaming(
                    fetch('main.wasm'), go.importObject
                );
                go.run(wasmModule.instance);
                
                // 检查WASM函数是否可用 - 只检查必需的函数
                if (typeof window.decryptSegmentM4s !== 'function' ||
                    typeof window.modifyInitM4s !== 'function') {
                    log('WASM functions not available', 'error');
                    return false;
                }
                
                wasmInitialized = true;
                log('WASM initialized successfully', 'success');
                return true;
            } catch (error) {
                log(`WASM initialization failed: ${error.message}`, 'error');
                return false;
            }
        }

        let stats = { decryptedSegments: 0, totalDecryptTime: 0, successCount: 0 };
        const logOutput = document.getElementById('logOutput');
        let player = null;
        
        // 日志滚动控制变量
        let autoScrollEnabled = true;
        const toggleScrollBtn = document.getElementById('toggleScrollBtn');
        let scrollButtonText = {
            enable: '开启滚动',
            disable: '停止滚动'
        };

        function log(msg, category = 'INFO') {
            const now = new Date();
            const time = now.toLocaleTimeString();
            const logMsg = `[${time}] [${category}] ${msg}`;
            
            // 添加时间戳到日志条目，以便稍后过滤
            const timestampedLogMsg = `[${now.getTime()}] ${logMsg}`;
            
            logOutput.textContent += timestampedLogMsg + '\n';
            
            // 仅在自动滚动启用时才滚动到底部
            if (autoScrollEnabled) {
                logOutput.parentElement.scrollTop = logOutput.parentElement.scrollHeight;
            }
            
            console.log(logMsg);
            
            // 定期清理超过1分钟的旧日志
            cleanupOldLogs();
        }
        
        // 切换自动滚动状态
        toggleScrollBtn.addEventListener('click', function() {
            autoScrollEnabled = !autoScrollEnabled;
            
            if (autoScrollEnabled) {
                // 开启自动滚动时，确保滚动到底部
                logOutput.parentElement.scrollTop = logOutput.parentElement.scrollHeight;
                toggleScrollBtn.textContent = scrollButtonText.disable;
                toggleScrollBtn.classList.remove('bg-red-600');
                toggleScrollBtn.classList.add('bg-yellow-600');
            } else {
                toggleScrollBtn.textContent = scrollButtonText.enable;
                toggleScrollBtn.classList.remove('bg-yellow-600');
                toggleScrollBtn.classList.add('bg-red-600');
            }
        });
        
        // 当用户手动滚动时，暂时禁用自动滚动
        logOutput.parentElement.addEventListener('scroll', function() {
            const isScrolledToBottom = 
                logOutput.parentElement.scrollHeight - logOutput.parentElement.clientHeight <= 
                logOutput.parentElement.scrollTop + 1; // 1像素的容差
            
            // 如果用户滚动到底部，则重新启用自动滚动
            if (isScrolledToBottom) {
                if (!autoScrollEnabled) {
                    autoScrollEnabled = true;
                    toggleScrollBtn.textContent = scrollButtonText.disable;
                    toggleScrollBtn.classList.remove('bg-red-600');
                    toggleScrollBtn.classList.add('bg-yellow-600');
                }
            } else {
                // 如果用户没有滚动到底部，则禁用自动滚动
                if (autoScrollEnabled) {
                    autoScrollEnabled = false;
                    toggleScrollBtn.textContent = scrollButtonText.enable;
                    toggleScrollBtn.classList.remove('bg-yellow-600');
                    toggleScrollBtn.classList.add('bg-red-600');
                }
            }
        });
        
        // 清理超过1分钟的旧日志
        function cleanupOldLogs() {
            const currentTime = new Date().getTime();
            const oneMinuteAgo = currentTime - 60000; // 60秒 = 60000毫秒
            
            const logLines = logOutput.textContent.split('\n');
            const recentLogLines = [];
            
            for (const line of logLines) {
                if (!line.trim()) {
                    // 空行直接保留
                    recentLogLines.push(line);
                    continue;
                }
                
                // 尝试解析时间戳
                const timestampMatch = line.match(/^\[(\d+)\]/);
                if (timestampMatch) {
                    const logTime = parseInt(timestampMatch[1]);
                    if (logTime > oneMinuteAgo) {
                        // 保留1分钟内的日志，但移除时间戳
                        const actualLogLine = line.substring(timestampMatch[0].length + 1); // +1 for the space
                        recentLogLines.push(actualLogLine);
                    }
                } else {
                    // 如果没有时间戳，则保留（可能是静态文本）
                    recentLogLines.push(line);
                }
            }
            
            // 只有当日志行数减少时才更新内容
            if (recentLogLines.length < logLines.length) {
                logOutput.textContent = recentLogLines.filter(line => line.trim()).join('\n');
            }
        }

        function updateUIStats(time, success) {
            stats.decryptedSegments++;
            stats.totalDecryptTime += time;
            if (success) stats.successCount++;
            document.getElementById('decryptedSegments').textContent = stats.decryptedSegments;
            document.getElementById('successRate').textContent = Math.round((stats.successCount / stats.decryptedSegments) * 100) + '%';
            document.getElementById('avgDecryptTime').textContent = (stats.totalDecryptTime / stats.decryptedSegments).toFixed(2) + ' ms';
        }

        // 从MPD中移除DRM信息
        function removeDRMFromMPD(content) {
            try {
                // 创建DOM解析器处理XML
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(content, 'application/xml');
                
                // 检查是否有解析错误
                const parserError = xmlDoc.querySelector('parsererror');
                if (parserError) {
                    log('MPD XML解析错误，将作为文本处理', 'WARN');
                    return removeDRMFromMPDAsText(content);
                }
                
                // 遍历所有AdaptationSet，查找ContentProtection并提取KID
                const adaptationSets = xmlDoc.querySelectorAll('AdaptationSet');
                adaptationSets.forEach(adaptationSet => {
                    const adpId = adaptationSet.getAttribute('id');
                    let kid = null;
                    
                    // 在当前AdaptationSet下查找ContentProtection元素
                    const contentProtections = adaptationSet.querySelectorAll('ContentProtection');
                    contentProtections.forEach(cp => {
                        const schemeIdUri = cp.getAttribute('schemeIdUri');
                        
                        // 检查是否是CENC或其他支持的DRM方案
                        if (schemeIdUri && (schemeIdUri.includes('mpeg:dash:mp4protection:2011') || 
                           schemeIdUri.includes('cenc') || 
                           schemeIdUri.includes('common encryption'))) {
                            
                            // 尝试获取KID值
                            kid = cp.getAttribute('cenc:default_KID');
                            if (!kid) {
                                kid = cp.getAttribute('default_KID');
                                if (!kid) {
                                    // 如果没有找到KID属性，尝试在ContentProtection内部查找
                                    const kidElement = cp.querySelector('cenc\\:default_KID, default_KID');
                                    if (kidElement) {
                                        kid = kidElement.textContent;
                                    }
                                }
                            }
                        }
                    });
                    
                    // 如果找到了KID，处理该AdaptationSet下的SegmentTemplate
                    if (kid) {
                        kid = kid.replace(/-/g, ''); // 移除可能的连字符
                        const segmentTemplates = adaptationSet.querySelectorAll('SegmentTemplate');
                        segmentTemplates.forEach(st => {
                            // 更新media属性
                            const mediaAttr = st.getAttribute('media');
                            if (mediaAttr) {
                                // 添加 KID 作为片段标识符
                                const separator = mediaAttr.includes('#') ? '&' : '#';
                                st.setAttribute('media', mediaAttr + separator + 'kid=' + kid);
                            }
                            
                            // 更新initialization属性
                            const initAttr = st.getAttribute('initialization');
                            if (initAttr) {
                                // 添加 KID 作为片段标识符
                                const separator = initAttr.includes('#') ? '&' : '#';
                                st.setAttribute('initialization', initAttr + separator + 'kid=' + kid);
                            }
                        });
                        
                        // 同样处理Representation下的SegmentTemplate
                        const representations = adaptationSet.querySelectorAll('Representation');
                        representations.forEach(rep => {
                            const repSegmentTemplates = rep.querySelectorAll('SegmentTemplate');
                            repSegmentTemplates.forEach(st => {
                                // 更新media属性
                                const mediaAttr = st.getAttribute('media');
                                if (mediaAttr) {
                                    // 添加 KID 作为片段标识符
                                    const separator = mediaAttr.includes('#') ? '&' : '#';
                                    st.setAttribute('media', mediaAttr + separator + 'kid=' + kid);
                                }
                                
                                // 更新initialization属性
                                const initAttr = st.getAttribute('initialization');
                                if (initAttr) {
                                    // 添加 KID 作为片段标识符
                                    const separator = initAttr.includes('#') ? '&' : '#';
                                    st.setAttribute('initialization', initAttr + separator + 'kid=' + kid);
                                }
                            });
                        });
                    }
                });
                
                // 移除ContentProtection相关的XML元素
                const contentProtectionElements = xmlDoc.querySelectorAll('ContentProtection');
                contentProtectionElements.forEach(element => {
                    element.remove();
                });
                
                // 移除MPD内的cenc:pssh元素（如果存在）
                const psshElements = xmlDoc.querySelectorAll('[*|schemeIdUri="urn:mpeg:dash:mp4protection:2011"], [*|schemeIdUri*="cenc"], [*|schemeIdUri*="common encryption"]');
                psshElements.forEach(element => {
                    element.remove();
                });
                
                // 序列化回字符串
                const serializer = new XMLSerializer();
                return serializer.serializeToString(xmlDoc);
            } catch (e) {
                log(`解析MPD时出错: ${e.message}，将作为文本处理`, 'WARN');
                return removeDRMFromMPDAsText(content);
            }
        }

        // 文本模式下移除DRM信息
        function removeDRMFromMPDAsText(content) {
            try {
                // 移除ContentProtection相关的XML元素
                let filteredContent = content.replace(/<ContentProtection[^>]*>[\s\S]*?<\/ContentProtection>/g, '');
                
                // 移除cenc:pssh相关的XML元素
                filteredContent = filteredContent.replace(/<cenc:pssh[^>]*>[\s\S]*?<\/cenc:pssh>/g, '');
                
                // 移除其他可能的DRM相关元素
                filteredContent = filteredContent.replace(/<widevine:license[^>]*>[\s\S]*?<\/widevine:license>/g, '');
                filteredContent = filteredContent.replace(/<marlin:chlgkey[^>]*>[\s\S]*?<\/marlin:chlgkey>/g, '');
                filteredContent = filteredContent.replace(/<marlin:enckey[^>]*>[\s\S]*?<\/marlin:enckey>/g, '');
                
                return filteredContent;
            } catch (e) {
                log(`文本模式处理MPD时出错: ${e.message}，返回原始内容`, 'ERROR');
                return content;
            }
        }
        
        // 获取所有KID:key对的函数
        function getAllClearKeys() {
            const inputs = document.querySelectorAll('.clearKeyInput');
            const keys = [];
            for (let input of inputs) {
                if (input.value.trim()) {
                    const parts = input.value.trim().split(':');
                    if (parts.length === 2) {
                        keys.push({
                            kid: parts[0].trim(),
                            key: parts[1].trim()
                        });
                    }
                }
            }
            return keys;
        }
        
        // 添加新的Key:KID输入框
        function addNewKeyInput() {
            const container = document.getElementById('clearKeyContainer');
            const div = document.createElement('div');
            div.className = 'flex gap-1 mb-1';
            div.innerHTML = `
                <input type="text" class="clearKeyInput w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm" 
                    placeholder="Format: key:kid (e.g. b85491a27c2852323ac704a07cf7b779:1acd2d7afd8cb34099cb832862e3c08d)">
                <button type="button" class="removeKeyBtn bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg font-medium">-</button>
            `;
            container.appendChild(div);
        }
        
        // 添加新的预设密钥输入框
        function addNewPresetKeyInput() {
            const container = document.getElementById('keysContainer');
            const div = document.createElement('div');
            div.className = 'key-input-row';
            div.innerHTML = `
                <input type="text" class="key-input" placeholder="Format: key:kid (e.g. b85491a27c2852323ac704a07cf7b779:1acd2d7afd8cb34099cb832862e3c08d)">
                <button type="button" class="remove-key-btn bg-red-600 hover:bg-red-700 text-white px-2 rounded">-</button>
            `;
            container.appendChild(div);
        }
        
        
        // 为添加按钮绑定事件
        document.getElementById('addKeyBtn').addEventListener('click', addNewKeyInput);
        
        // 为预设表单中的添加密钥按钮绑定事件
        document.getElementById('keysContainer').addEventListener('click', function(e) {
            if (e.target.classList.contains('add-key-btn')) {
                addNewPresetKeyInput();
            }
            
            if (e.target.classList.contains('remove-key-btn')) {
                const container = e.target.parentElement;
                if (document.querySelectorAll('.key-input-row').length > 1) {
                    container.remove();
                } else {
                    // 如果只剩一个输入框，清空而不是删除
                    container.querySelector('.key-input').value = '';
                }
            }
        });
        
        // 使用事件委托处理删除按钮
        document.getElementById('clearKeyContainer').addEventListener('click', function(e) {

        // 函数：移除所有预设按钮的激活状态
        function removeActivePresetClass() {

            document.getElementById('preset2Btn').classList.remove('active');
            document.getElementById('preset3Btn').classList.remove('active');

        // 从localStorage获取预设数据
        function getPresetsFromStorage() {
            const presetsStr = localStorage.getItem('presets');
            return presetsStr ? JSON.parse(presetsStr) : [];
        }
        
        // 保存预设数据到localStorage
        function savePresetsToStorage(presets) {
            localStorage.setItem('presets', JSON.stringify(presets));
        }
        
        // 删除预设数据
        function deletePreset(index) {
            const presets = getPresetsFromStorage();
            presets.splice(index, 1);
            savePresetsToStorage(presets);
        }
        
        // 从预设中获取所有密钥
        function getKeysFromPreset(preset) {
            if (!preset.keys || !Array.isArray(preset.keys)) {
                // 兼容旧格式，如果只有单个key
                if (preset.key) {
                    // 旧格式是 kid:key，不需要翻转
                    const parts = preset.key.split(':');
                    return [{ kid: parts[0], key: parts[1] }]; // 正确顺序
                }
                return [];
            }
            
            // 新格式，处理 kid:key 格式
            return preset.keys.map(k => {
                const parts = k.split(':');
                return { kid: parts[0], key: parts[1] }; // 正确顺序
            });
        }
        
        // 创建一个新的预设按钮
        function createPresetButton(preset, index) {
            const button = document.createElement('button');
            button.className = 'preset-btn flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-2 rounded-lg text-sm font-medium transition relative';
            button.textContent = preset.name;
            button.dataset.index = index;
            
            // 添加删除按钮
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'absolute top-0 right-0 m-1 text-xs bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center';
            deleteBtn.textContent = '×';
            deleteBtn.title = '删除此预设';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // 阻止冒泡到父按钮
                
                if(confirm(`确定要删除预设 "${preset.name}" 吗？`)) {
                    deletePreset(index);
                    renderDynamicPresets();
                    log(`已删除预设: ${preset.name}`, 'APP');
                }
            });
            
            button.appendChild(deleteBtn);
            
            button.addEventListener('click', () => {
                player.unload();
                document.getElementById('m3u8Url').value = preset.url;
                
                // 清空现有的输入框
                const container = document.getElementById('clearKeyContainer');
                container.innerHTML = '';
                
                // 获取预设的密钥
                const keys = getKeysFromPreset(preset);
                
                if (keys.length > 0) {
                    // 为每个密钥创建输入框
                    keys.forEach((keyObj, idx) => {
                        const formattedValue = `${keyObj.kid}:${keyObj.key}`;
                        
                        if (idx === 0) {
                            // 第一个密钥直接填充到现有的输入框
                            const firstInput = container.querySelector('.clearKeyInput');
                            if (firstInput) {
                                firstInput.value = formattedValue;
                            } else {
                                addNewKeyInput();
                                const newInput = container.querySelector('.clearKeyInput');
                                newInput.value = formattedValue;
                            }
                        } else {
                            // 其他密钥添加新的输入框
                            addNewKeyInput();
                            const allInputs = container.querySelectorAll('.clearKeyInput');
                            const lastInput = allInputs[allInputs.length - 1];
                            lastInput.value = formattedValue;
                        }
                    });
                } else {
                    // 如果没有密钥，至少保留一个空输入框
                    addNewKeyInput();
                }
                
                log(`已载入预设: ${preset.name}`, 'APP');
                
                // 移除其他按钮的激活状态，然后给当前按钮添加激活状态
                removeActivePresetClass();
                button.classList.add('active');
                document.getElementById('loadBtn').click();
            });
            
            return button;
        }

        async function initShaka() {
            // 针对 iOS 17.1+ 的强制补丁：在所有初始化之前绑定
            if (window.ManagedMediaSource && !window.MediaSource) {
                log('检测到 ManagedMediaSource，正在应用 MSE 欺骗补丁...', 'PATCH');
                window.MediaSource = window.ManagedMediaSource;
            }

            const hasMSE = 'MediaSource' in window;
            log(`环境诊断: MSE=${hasMSE}, ManagedMSE=${'ManagedMediaSource' in window}`, 'DIAG');

            const video = document.getElementById('videoPlayer');
            const ui = video["ui"];  
            const controls = ui.getControls();
            player = controls.getPlayer();
            
                        
            // 设置播放器配置
            player.configure({
                streaming: {
                    preferNativeHls: false,
                    // 1. 播放器尝试保持的总缓存量（默认 30s，网络不稳定建议加到 60s）
                    bufferingGoal: 60,

                    // 2. 视频起播前必须下载够多少秒（默认 2s，卡顿建议设为 5-10s）
                    rebufferingGoal: 5,

                    // 3. 发生卡顿（Buffer耗尽）后，重新恢复播放前需要存够多少秒
                    // 建议设为与 rebufferingGoal 一致，或者略小
                    bufferBehind: 30, // 保留已经播放过的缓存量，方便回拖  
                },
                abr: {
                // 默认是 0.95，改为 0.7 意味着只有当带宽远超需求时才升档
                bandwidthUpgradeTarget: 0.7,
                // 默认是 0.85，降低这个值会让播放器更保守，优先保流畅
                bandwidthDowngradeTarget: 0.9,
                // 初始带宽估值（10Mbps），帮助播放器在起播时选择合适的档位
                defaultBandwidthEstimate: 10000000,
                enabled: true
              },
                manifest: {
                    disableThumbnails: true
                }        
            });

            // 初始化一个Map来存储uriKid映射，并记录插入顺序
            if (typeof window.uriKidMap === 'undefined') {
                window.uriKidMap = new Map();
            }
            
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                // 只处理媒体段和初始化段的请求
                if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    const uri = request.uris[0];                    
                    if (uri.includes('#kid=')) {
                        const parts = uri.split('#kid=');
                        const realUri = parts[0];
                        const kidParam = parts[1];
                        
                        // 解析可能存在的多组 kid:key，以 & 分隔
                        let kids = [];
                        if (kidParam.includes('&')) {
                            // 如果有多个参数，分割并提取所有 kid 相关部分
                            const params = kidParam.split('&');
                            for (const param of params) {
                                if (param.startsWith('kid=')) {
                                    kids.push(param.substring(4)); // 移除 'kid=' 前缀
                                }
                            }
                        } else {
                            // 单个 kid
                            kids.push(kidParam);
                        }
                        
                        // 检查映射大小，如果达到或超过100个条目，则删除最早添加的条目
                        if (window.uriKidMap.size >= 100) {
                            // 获取Map的第一个键（最老的条目）并删除
                            const firstKey = window.uriKidMap.keys().next().value;
                            window.uriKidMap.delete(firstKey);
                        }
                        
                        // 添加新的映射关系，存储多个kids数组
                        window.uriKidMap.set(realUri, kids);

                        // --- 核心操作 ---
                        // 1. 你现在拿到了 kids，可以用它来进行后续解密
                        console.log(`正在请求包含 ${kids.length} 个KID的切片: ${JSON.stringify(kids)}，当前映射总数: ${window.uriKidMap.size}`);
                        
                        // 2. 必须把 URL 还原，否则服务器会报 404
                        request.uris[0] = realUri; 
                    }
                }
            });

            // 注册响应拦截
            player.getNetworkingEngine().registerResponseFilter(async (type, response) => {
                const url = response.uri.split('?')[0];
                const fileName = url.split('/').pop();

                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                    log(`[RES] 收到清单: ${fileName}`, 'NETWORK');
                    const decoder = new TextDecoder();
                    let content = decoder.decode(response.data);

                    // 检查是否是 HLS Master Playlist
                    if (content.includes('#EXT-X-STREAM-INF')) {
                        const lines = content.split('\n');
                        const filteredLines = [];

                        for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;

                        // 识别视频轨道声明
                        if (line.startsWith('#EXT-X-STREAM-INF:')) {
                            const resMatch = line.match(/RESOLUTION=\d+x(\d+)/i);
                            if (resMatch) {
                            const height = parseInt(resMatch[1]);
                            // 如果分辨率高度 < 1080，则跳过这一行和紧随其后的 URL 行
                            if (height < 720) {
                                i++; // 跳过 URL 行
                                continue;
                            }
                            }
                        }
                        // 保留其他所有行（头部、音频声明、高清视频轨道）
                        filteredLines.push(line);
                        }
                        response.data = new TextEncoder().encode(filteredLines.join('\n'));
                    }
                    
                    // 检查是否是HLS manifest (m3u8)
                    else if (content.includes('#EXT-X-KEY:')) {
                        log('发现 EXT-X-KEY，已动态移除以接管解密逻辑', 'STRIP');
                        const lines = content.split('\n').filter(line => !line.includes('#EXT-X-KEY:'));
                        response.data = new TextEncoder().encode(lines.join('\n'));
                    } 

                    // 检查是否是DASH manifest (mpd)
                    else if (url.toLowerCase().includes('.mpd') || content.includes('<MPD') || content.includes('urn:mpeg:dash:schema:mpd')) {
                        log('发现 DASH MPD 清单，正在移除 DRM 信息', 'STRIP');
                        // 解析并移除MPD中的DRM相关内容
                        const filteredContent = removeDRMFromMPD(content);
                        response.data = new TextEncoder().encode(filteredContent);
                    }
                }

                if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    const isInit = response.uri.includes('init');
                    const startTime = performance.now();
                    try {
                        // 获取所有KID:Key对
                        let allKeys = getAllClearKeys();
                        if (allKeys.length === 0) {
                            log('没有找到有效的 KID:Key 对', 'ERROR');
                            return;
                        }
                        
                        let kid, key;
                        // 检查是否有多组 KID:Key
                        if (allKeys.length > 0) {
                            // 如果是从 uriKidMap 中获取了特定的 KID
                            const cached_kids = window.uriKidMap.get(response.uri);
                            if (cached_kids && Array.isArray(cached_kids) && cached_kids.length > 0) {
                                // 使用映射中的第一个 KID（或者可以实现更复杂的匹配逻辑）
                                const target_kid = cached_kids[0];
                                // 在所有密钥中找到匹配的 KID
                                const matchedKeyObj = allKeys.find(item => item.kid === target_kid);
                                if (matchedKeyObj) {
                                    kid = matchedKeyObj.kid;
                                    key = matchedKeyObj.key;
                                } else {
                                    log(`没有找到有效的 KID:Key, KID = ${target_kid}`, 'ERROR');
                                    player.unload();
                                    log('已停止播放', 'APP');
                                    return;
                                }
                            } else {
                                // 如果没有缓存的 KID，使用第一个
                                kid = allKeys[0].kid;
                                key = allKeys[0].key;
                            }
                        } else {
                            // 单个 KID:Key 的情况
                            const cached_kid = window.uriKidMap.get(response.uri);
                            if (cached_kid) {
                                kid = cached_kid;
                            } else {
                                // 如果没有找到任何键，抛出错误
                                log('没有找到有效的 KID:Key 对', 'ERROR');
                                return;
                            }
                            key = ''; // 这里不应该到达，因为我们应该已经有键了
                        }
                        
                        let result;
                        if (isInit) {
                            log(`[RES] 处理 Init: ${fileName}`, 'NETWORK');
    
                            result = window.modifyInitM4s(new Uint8Array(response.data), kid);
                            if (result && result.success) {
                                response.data = result.data.buffer || result.data;
                                const duration = performance.now() - startTime;
                                if (!isInit) {
                                    log(`[OK] 初始化文件成功: ${fileName}`, 'DECRYPT');
                                    updateUIStats(duration, true);
                                }
                            } else {
                                log(`[ERROR] 初始化文件成功 失败 for ${fileName}: ${result ? result.error || JSON.stringify(result) : 'no result'}`, 'ERROR');
                            }
                        } else {
                            log(`[RES] 处理 Media: ${fileName}`, 'NETWORK');
                            if (typeof window.decryptSegmentM4s !== 'function') {
                                log('decryptSegmentM4s function not available', 'ERROR');
                                return;
                            }
                            
                            // 调用解密函数并记录结果
                            const result = window.decryptSegmentM4s(new Uint8Array(response.data), kid);
                            
                            // 添加调试日志，检查结果
                            if (!result) {
                                log(`[ERROR] decryptSegmentM4s returned null/undefined for ${fileName}`, 'ERROR');
                            } else if (typeof result === 'object' && result.hasOwnProperty('success') === false) {
                                log(`[DEBUG] decryptSegmentM4s result structure: ${JSON.stringify(Object.keys(result))}`, 'DEBUG');
                            }
                            
                            if (result && result.success) {
                                response.data = result.data.buffer || result.data;
                                const duration = performance.now() - startTime;
                                if (!isInit) {
                                    log(`[OK] 解密成功: ${fileName}`, 'DECRYPT');
                                    updateUIStats(duration, true);
                                }
                            } else {
                                log(`[ERROR] WASM function failed for ${fileName}: ${result ? result.error || JSON.stringify(result) : 'no result'}`, 'ERROR');
                            }
                        }
                    } catch (err) {
                        log(`解密管道异常: ${err.message}`, 'ERROR');
                    }
                }
            });

            player.addEventListener('error', (e) => {
                log(`Shaka 错误 [${e.detail.code}]: ${e.detail.message}`, 'ERROR');
                if (e.detail.code === 1001) {
                    log(`网络请求失败！地址：${e.detail.data[0]}，HTTP 状态码为:, ${e.detail.data[1]}`, 'ERROR');
                }         
            });
        }

                // 清空密钥输入框，但保留一个空的
                const keysContainer = document.getElementById('keysContainer');
                keysContainer.innerHTML = '<div class="key-input-row"><input type="text" class="key-input" placeholder="格式: kid:key (e.g. 1acd2d7afd8cb34099cb832862e3c08d:b85491a27c2852323ac704a07cf7b779)"><button type="button" class="add-key-btn bg-green-600 hover:bg-green-700 text-white px-2 rounded">+</button></div>';
                
                log(`已添加新预设: ${name}`, 'APP');
            });
            
            // 取消添加新预设的事件
            document.getElementById('cancelPresetBtn').addEventListener('click', () => {
                document.getElementById('newPresetForm').style.display = 'none';
                document.getElementById('presetName').value = '';
                document.getElementById('presetUrl').value = '';
                
                // 清空密钥输入框，但保留一个空的
                const keysContainer = document.getElementById('keysContainer');
                keysContainer.innerHTML = '<div class="key-input-row"><input type="text" class="key-input" placeholder="格式: kid:key (e.g. 1acd2d7afd8cb34099cb832862e3c08d:b85491a27c2852323ac704a07cf7b779)"><button type="button" class="add-key-btn bg-green-600 hover:bg-green-700 text-white px-2 rounded">+</button></div>';
            });
        });
    </script>
