<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaka Player + WASM fMP4 解密拦截 (iOS 兼容版)</title>
    
    <!-- Shaka Player CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.5.0/controls.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .custom-v-height { height: 450px; }
        #logOutput {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.4;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e5e7eb;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">Shaka Player + WASM fMP4 Decryptor</h1>
            <p class="text-gray-600 mt-2">iOS 兼容模式：针对 ManagedMediaSource 强制拦截</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left: Controls -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">M3U8 URL</label>
                            <input type="url" id="m3u8Url" 
                                class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                                value="https://lpnba.akamaized.net/live-pz/p/hls-wvpr/NBATVI/index.m3u8?addUserInfo=1&start=LIVE&end=END&PostalCode=0&ISO3166=&sessionId=1fc59b3a-cadb-4d4d-89d8-e07c32f5fd96">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Clear Key (kid:key)</label>
                            <input type="text" id="clearKey" 
                                class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm"
                                value="1acd2d7afd8cb34099cb832862e3c08d:b85491a27c2852323ac704a07cf7b779">
                        </div>
                        <div class="flex flex-wrap gap-2 pt-2">
                            <button id="loadBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition flex-1">加载视频</button>
                            <button id="stopBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium transition">停止</button>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="stat-card">
                        <span class="block text-xs text-gray-500 uppercase font-bold">解密片段</span>
                        <span id="decryptedSegments" class="text-2xl font-bold text-blue-600">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="block text-xs text-gray-500 uppercase font-bold">成功率</span>
                        <span id="successRate" class="text-2xl font-bold text-green-500">0%</span>
                    </div>
                    <div class="stat-card col-span-2">
                        <span class="block text-xs text-gray-500 uppercase font-bold">平均耗时</span>
                        <span id="avgDecryptTime" class="text-xl font-bold text-gray-700">0 ms</span>
                    </div>
                </div>
                
                <button id="resetStatsBtn" class="w-full py-2 text-sm text-gray-500 hover:text-gray-700 underline">重置统计数据</button>
            </div>

            <!-- Right: Player & Logs -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-black rounded-xl overflow-hidden shadow-2xl custom-v-height relative group">
                    <!-- 核心：添加 disableremoteplayback 和 x5-video-player-type -->
                    <video id="videoPlayer" class="w-full h-full" playsinline controls disableremoteplayback x5-video-player-type="h5-page"></video>
                </div>

                <!-- Log Terminal -->
                <div class="bg-gray-900 rounded-xl overflow-hidden flex flex-col h-64 shadow-inner">
                    <div class="bg-gray-800 px-4 py-2 flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">拦截监控 (ManagedMSE 激活)</span>
                        <button id="copyLogBtn" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded transition">复制日志</button>
                    </div>
                    <div class="p-4 overflow-y-auto flex-1 text-green-400">
                        <pre id="logOutput" class="whitespace-pre-wrap"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.5.0/shaka-player.compiled.js"></script>

    <script src="wasm_exec.js"></script>
    <script>
        async function initializeWasm() {
            if (typeof Go === 'undefined') {
                log('wasm_exec.js not loaded', 'error');
                return false;
            }

            try {
                const go = new Go();
                const wasmModule = await WebAssembly.instantiateStreaming(
                    fetch('main.wasm'), go.importObject
                );
                go.run(wasmModule.instance);
                
                // 检查WASM函数是否可用 - 只检查必需的函数
                if (typeof window.decryptSegmentM4s !== 'function' ||
                    typeof window.modifyInitM4s !== 'function') {
                    log('WASM functions not available', 'error');
                    return false;
                }
                
                wasmInitialized = true;
                log('WASM initialized successfully', 'success');
                return true;
            } catch (error) {
                log(`WASM initialization failed: ${error.message}`, 'error');
                return false;
            }
        }

        let stats = { decryptedSegments: 0, totalDecryptTime: 0, successCount: 0 };
        const logOutput = document.getElementById('logOutput');
        let player = null;

        function log(msg, category = 'INFO') {
            const time = new Date().toLocaleTimeString();
            const logMsg = `[${time}] [${category}] ${msg}`;
            logOutput.textContent += logMsg + '\n';
            logOutput.parentElement.scrollTop = logOutput.parentElement.scrollHeight;
            console.log(logMsg);
        }

        function updateUIStats(time, success) {
            stats.decryptedSegments++;
            stats.totalDecryptTime += time;
            if (success) stats.successCount++;
            document.getElementById('decryptedSegments').textContent = stats.decryptedSegments;
            document.getElementById('successRate').textContent = Math.round((stats.successCount / stats.decryptedSegments) * 100) + '%';
            document.getElementById('avgDecryptTime').textContent = (stats.totalDecryptTime / stats.decryptedSegments).toFixed(2) + ' ms';
        }

        function parseClearKey(raw) {
            const parts = raw.split(':');
            if (parts.length !== 2) throw new Error('无效的 Key 格式');
            return { kid: parts[0].trim(), key: parts[1].trim() };
        }

        async function initShaka() {
            // 针对 iOS 17.1+ 的强制补丁：在所有初始化之前绑定
            if (window.ManagedMediaSource && !window.MediaSource) {
                log('检测到 ManagedMediaSource，正在应用 MSE 欺骗补丁...', 'PATCH');
                window.MediaSource = window.ManagedMediaSource;
            }

            const hasMSE = 'MediaSource' in window;
            log(`环境诊断: MSE=${hasMSE}, ManagedMSE=${'ManagedMediaSource' in window}`, 'DIAG');

            const video = document.getElementById('videoPlayer');
            player = new shaka.Player(video);

            // 极为强力的拦截配置
            player.configure({
                streaming: {
                    useNativeHlsOnSafari: false,
                    preferNativeHls: false,
                    bufferingGoal: 10,
                    rebufferingGoal: 2,
                    // 强制增加失败重试，防止快速回退到原生播放
                    failureCallback: (error) => {
                        log(`播放器尝试回退: ${error.code}`, 'WARN');
                    }
                },
                manifest: {
                    disableThumbnails: true,
                    retryParameters: {
                        maxAttempts: 5,
                        baseDelay: 1000,
                        backoffFactor: 2
                    },
                    hls: {
                        ignoreManifestProgramDateTime: true
                    }
                }
            });

            // 注册请求拦截
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                const url = request.uris[0].split('?')[0];
                const fileName = url.split('/').pop();
                log(`[REQ] 拦截成功: ${fileName}`, 'NETWORK');
            });

            // 注册响应拦截
            player.getNetworkingEngine().registerResponseFilter(async (type, response) => {
                const url = response.uri.split('?')[0];
                const fileName = url.split('/').pop();

                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                    log(`[RES] 收到清单: ${fileName}`, 'NETWORK');
                    const decoder = new TextDecoder();
                    let content = decoder.decode(response.data);
                    if (content.includes('#EXT-X-KEY:')) {
                        log('发现 EXT-X-KEY，已动态移除以接管解密逻辑', 'STRIP');
                        const lines = content.split('\n').filter(line => !line.includes('#EXT-X-KEY:'));
                        response.data = new TextEncoder().encode(lines.join('\n'));
                    }
                }

                if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    const isInit = response.uri.includes('init');
                    const startTime = performance.now();
                    try {
                        const { kid, key } = parseClearKey(document.getElementById('clearKey').value);
                        let result;
                        if (isInit) {
                            log(`[RES] 处理 Init: ${fileName}`, 'NETWORK');
                            // 直接传递kid和key，避免使用全局状态
                            window.addKey(kid, key); 
                            result = window.modifyInitM4s(new Uint8Array(response.data), kid);
                        } else {
                            log(`[RES] 处理 Media: ${fileName}`, 'NETWORK');
                            if (typeof window.decryptSegmentM4s !== 'function') {
                                log('decryptSegmentM4s function not available', 'ERROR');
                                return;
                            }
                            
                            // 调用解密函数并记录结果
                            const result = window.decryptSegmentM4s(new Uint8Array(response.data), kid, key);
                            
                            // 添加调试日志，检查结果
                            if (!result) {
                                log(`[ERROR] decryptSegmentM4s returned null/undefined for ${fileName}`, 'ERROR');
                            } else if (typeof result === 'object' && result.hasOwnProperty('success') === false) {
                                log(`[DEBUG] decryptSegmentM4s result structure: ${JSON.stringify(Object.keys(result))}`, 'DEBUG');
                            }
                            
                            if (result && result.success) {
                                response.data = result.data.buffer || result.data;
                                if (!isInit) {
                                    const duration = performance.now() - startTime;
                                    log(`[OK] 解密成功: ${fileName}`, 'DECRYPT');
                                    updateUIStats(duration, true);
                                }
                            } else {
                                log(`[ERROR] WASM function failed for ${fileName}: ${result ? result.error || JSON.stringify(result) : 'no result'}`, 'ERROR');
                            }
                        }
                        if (result && result.success) {
                            response.data = result.data.buffer || result.data;
                            if (!isInit) {
                                const duration = performance.now() - startTime;
                                log(`[OK] 解密成功: ${fileName}`, 'DECRYPT');
                                updateUIStats(duration, true);
                            }
                        }
                    } catch (err) {
                        log(`解密管道异常: ${err.message}`, 'ERROR');
                    }
                }
            });

            player.addEventListener('error', (e) => {
                log(`Shaka 错误 [${e.detail.code}]: ${e.detail.message}`, 'ERROR');
            });
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await initializeWasm();
            await initShaka();

            document.getElementById('loadBtn').addEventListener('click', async () => {
                const url = document.getElementById('m3u8Url').value;
                const keyStr = document.getElementById('clearKey').value;
                
                try {
                    const { kid, key } = parseClearKey(keyStr);
                    // 不再调用window.addKey(kid, key)，直接在解密时传递密钥
                    
                    log('触发用户交互，准备加载 (MSE 模式)...', 'APP');
                    
                    // 再次检查补丁状态
                    if (window.ManagedMediaSource && window.MediaSource === window.ManagedMediaSource) {
                        log('ManagedMediaSource 补丁状态确认: Active', 'DIAG');
                    }

                    await player.load(url);
                    log('Load 成功完成', 'APP');
                    
                    // 状态监测
                    setTimeout(() => {
                        const video = document.getElementById('videoPlayer');
                        const isBlob = video.src.startsWith('blob:');
                        log(`当前播放模式: ${isBlob ? 'MSE (拦截开启)' : 'Native (拦截失效)'}`, isBlob ? 'SUCCESS' : 'WARN');
                    }, 3000);

                } catch (e) {
                    log('加载崩溃: ' + e.message, 'ERROR');
                    if (e.code === 6006) {
                        log('错误 6006：系统强制回退到原生播放，请检查是否在 iPhone 隐私设置中禁用了 MSE', 'ERROR');
                    }
                }
            });

            document.getElementById('stopBtn').addEventListener('click', () => {
                player.unload();
                log('已停止播放', 'APP');
            });

            document.getElementById('resetStatsBtn').addEventListener('click', () => {
                stats = { decryptedSegments: 0, totalDecryptTime: 0, successCount: 0 };
                document.getElementById('decryptedSegments').textContent = '0';
                log('统计重置', 'APP');
            });
            
            document.getElementById('copyLogBtn').addEventListener('click', () => {
                const text = logOutput.textContent;
                navigator.clipboard.writeText(text);
                log('日志已复制', 'APP');
            });
        });
    </script>
</body>
</html>
